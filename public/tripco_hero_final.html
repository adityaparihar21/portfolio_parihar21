<style>

</style>

    resize();
    spawnVehicles();
  });
  const W = () => canvas.width,
    H = () => canvas.height;
  const PAL = ["#c8875a", "#7ba882", "#8b9db5", "#c47d8a", "#ede8e2"];

  function drawCar(x, s) {
    x.beginPath();

    x.bezierCurveTo(48 * s, -10 * s, 52 * s, -6 * s, 52 * s, -2 * s);
    x.lineTo(52 * s, 8 * s);

    x.stroke();
    x.beginPath();

    x.bezierCurveTo(8 * s, -28 * s, 18 * s, -28 * s, 24 * s, -20 * s);

    x.closePath();
    x.stroke();
    x.beginPath();
    x.moveTo(-2 * s, -20 * s);
    x.lineTo(-2 * s, -10 * s);
    x.stroke();
    x.beginPath();
    x.arc(-30 * s, 10 * s, 11 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(-30 * s, 10 * s, 4 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(30 * s, 10 * s, 11 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(30 * s, 10 * s, 4 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.moveTo(-54 * s, 3 * s);
    x.lineTo(-60 * s, 3 * s);
    x.lineTo(-60 * s, 8 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(54 * s, 3 * s);
    x.lineTo(60 * s, 3 * s);
    x.lineTo(60 * s, 8 * s);

  function drawBike(x, s) {
    const R = 22 * s;
    x.beginPath();
    x.arc(-R, 6 * s, R, 0, Math.PI * 2);
    x.stroke();
    for (let i = 0; i < 8; i++) {
      const a = (i * Math.PI) / 4;
      x.beginPath();
      x.moveTo(-R, 6 * s);
      x.lineTo(-R + Math.cos(a) * R, 6 * s + Math.sin(a) * R);
      x.stroke();
    }
    x.beginPath();
    x.arc(R, 6 * s, R, 0, Math.PI * 2);
    x.stroke();
    for (let i = 0; i < 8; i++) {
      const a = (i * Math.PI) / 4;
      x.beginPath();
      x.moveTo(R, 6 * s);
      x.lineTo(R + Math.cos(a) * R, 6 * s + Math.sin(a) * R);
      x.stroke();
    }
    x.beginPath();
    x.moveTo(-R, 6 * s);
    x.lineTo(-4 * s, -14 * s);
    x.lineTo(R, 6 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-4 * s, -14 * s);
    x.lineTo(-14 * s, -6 * s);
    x.lineTo(-R, 6 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-4 * s, -14 * s);
    x.lineTo(-4 * s, -22 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-10 * s, -22 * s);
    x.lineTo(2 * s, -22 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(R - 3 * s, -18 * s);
    x.lineTo(R, 6 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(R - 4 * s, -18 * s);
    x.lineTo(R - 4 * s, -24 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(R - 10 * s, -24 * s);
    x.bezierCurveTo(R - 10 * s, -28 * s, R + 5 * s, -28 * s, R + 5 * s, -22 * s);
    x.stroke();
    x.beginPath();
    x.arc(-4 * s, -4 * s, 7 * s, 0, Math.PI * 2);
    x.stroke();
  }
  function drawMotorbike(x, s) {
    const R = 16 * s;
    x.beginPath();
    x.arc(-R, 8 * s, R, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(-R, 8 * s, 5 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(R, 8 * s, R, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(R, 8 * s, 5 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.moveTo(-R, 8 * s);
    x.lineTo(0, -6 * s);
    x.lineTo(R, 8 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(0, -6 * s);
    x.lineTo(-8 * s, 2 * s);
    x.lineTo(-R, 8 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(R - 2 * s, -14 * s);
    x.lineTo(R, 8 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(R - 8 * s, -14 * s);
    x.lineTo(R + 6 * s, -14 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-2 * s, -18 * s);

    x.stroke();
    x.beginPath();
    x.moveTo(-2 * s, -6 * s);
    x.lineTo(-2 * s, -18 * s);

    x.rect(-10 * s, -10 * s, 10 * s, 8 * s);

  function drawTram(x, s) {
    x.beginPath();
    x.rect(-56 * s, -28 * s, 112 * s, 36 * s);

    x.beginPath();
    x.rect(-52 * s, -32 * s, 104 * s, 6 * s);

  function drawTrain(x, s) {

    x.beginPath();

  function drawHotAirBalloon(x, s) {
    x.beginPath();
    x.ellipse(0, -20 * s, 22 * s, 30 * s, 0, 0, Math.PI * 2);
    x.stroke();
    for (let i = 0; i < 5; i++) {

    x.stroke();
    x.beginPath();
    x.moveTo(12 * s, 8 * s);
    x.lineTo(14 * s, 20 * s);
    x.stroke();
    x.beginPath();
    x.rect(-14 * s, 18 * s, 28 * s, 8 * s);

    x.beginPath();
    x.moveTo(-4 * s, 24 * s);
    x.lineTo(-4 * s, 28 * s);
    x.moveTo(4 * s, 24 * s);
    x.lineTo(4 * s, 28 * s);

  }
  function drawScooter(x, s) {
    const R = 12 * s;
    x.beginPath();
    x.arc(-R, 8 * s, R, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(-R, 8 * s, 4 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(R, 8 * s, R, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(R, 8 * s, 4 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.moveTo(-R, -4 * s);
    x.lineTo(2 * s, -14 * s);
    x.lineTo(R, -4 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-R, -4 * s);
    x.bezierCurveTo(-R - 4 * s, -4 * s, -R - 4 * s, 8 * s, -R, 8 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(2 * s, -14 * s);
    x.lineTo(2 * s, -22 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-4 * s, -22 * s);
    x.lineTo(8 * s, -22 * s);
    x.stroke();
    x.beginPath();
    x.rect(-14 * s, -8 * s, 12 * s, 6 * s);
    x.stroke();
  }
  function drawTrafficLight(x, s) {
    x.beginPath();
    x.rect(-8 * s, -32 * s, 16 * s, 38 * s);
    x.stroke();
    x.beginPath();
    x.arc(0, -24 * s, 5 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(0, -12 * s, 5 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.arc(0, 0, 5 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.moveTo(0, 6 * s);
    x.lineTo(0, 18 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-8 * s, 18 * s);
    x.lineTo(8 * s, 18 * s);
    x.stroke();
  }
  function drawCone(x, s) {
    x.beginPath();
    x.moveTo(0, -30 * s);
    x.lineTo(18 * s, 6 * s);
    x.lineTo(-18 * s, 6 * s);
    x.closePath();
    x.stroke();
    x.beginPath();
    x.moveTo(-8 * s, -12 * s);
    x.lineTo(8 * s, -12 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-13 * s, -2 * s);
    x.lineTo(13 * s, -2 * s);
    x.stroke();
    x.beginPath();
    x.rect(-20 * s, 6 * s, 40 * s, 5 * s);
    x.stroke();
    x.beginPath();
    x.rect(-3 * s, -34 * s, 6 * s, 5 * s);
    x.stroke();
  }
  function drawGasPump(x, s) {
    x.beginPath();
    x.rect(-18 * s, -36 * s, 36 * s, 54 * s);
    x.stroke();
    x.beginPath();
    x.rect(-12 * s, -30 * s, 24 * s, 14 * s);
    x.stroke();
    x.beginPath();
    x.rect(-12 * s, -10 * s, 24 * s, 12 * s);
    x.stroke();
    x.beginPath();
    x.rect(-12 * s, 8 * s, 24 * s, 10 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(18 * s, -16 * s);
    x.bezierCurveTo(28 * s, -16 * s, 28 * s, -4 * s, 22 * s, -4 * s);
    x.stroke();
    x.beginPath();
    x.arc(0, -36 * s, 10 * s, Math.PI, 0);
    x.stroke();
    x.beginPath();
    x.rect(-22 * s, 18 * s, 44 * s, 6 * s);
    x.stroke();
  }
  function drawBusStop(x, s) {
    x.beginPath();
    x.rect(-40 * s, -40 * s, 80 * s, 6 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-40 * s, -40 * s);
    x.bezierCurveTo(-40 * s, -46 * s, -36 * s, -48 * s, -30 * s, -48 * s);
    x.lineTo(30 * s, -48 * s);
    x.bezierCurveTo(36 * s, -48 * s, 40 * s, -46 * s, 40 * s, -40 * s);
    x.stroke();
    for (let i = 0; i < 3; i++) {
      x.beginPath();
      x.moveTo((-28 + i * 20) * s, -34 * s);
      x.lineTo((-28 + i * 20) * s, 6 * s);
      x.lineTo((-10 + i * 20) * s, 6 * s);
      x.lineTo((-10 + i * 20) * s, -34 * s);
      x.stroke();
    }
    x.beginPath();
    x.moveTo(-38 * s, -40 * s);
    x.lineTo(-38 * s, 6 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(38 * s, -40 * s);
    x.lineTo(38 * s, 6 * s);
    x.stroke();
    x.beginPath();
    x.rect(-20 * s, -4 * s, 40 * s, 5 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-18 * s, -4 * s);
    x.lineTo(-18 * s, 6 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(18 * s, -4 * s);
    x.lineTo(18 * s, 6 * s);
    x.stroke();
  }
  function drawSailboat(x, s) {
    x.beginPath();
    x.moveTo(-40 * s, 10 * s);
    x.bezierCurveTo(-38 * s, 14 * s, 38 * s, 14 * s, 40 * s, 10 * s);
    x.closePath();
    x.stroke();
    x.beginPath();
    x.moveTo(0, 10 * s);
    x.lineTo(0, -44 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(0, -44 * s);
    x.lineTo(-34 * s, 10 * s);
    x.lineTo(0, 10 * s);
    x.closePath();
    x.stroke();
    x.beginPath();
    x.moveTo(0, -30 * s);
    x.lineTo(26 * s, 10 * s);
    x.lineTo(0, 10 * s);
    x.closePath();
    x.stroke();
    x.beginPath();
    x.setLineDash([3, 5]);
    x.moveTo(-50 * s, 14 * s);
    x.lineTo(50 * s, 14 * s);
    x.stroke();
    x.setLineDash([]);
  }
  function drawRocketship(x, s) {
    x.beginPath();
    x.moveTo(0, -40 * s);
    x.bezierCurveTo(12 * s, -28 * s, 14 * s, -10 * s, 14 * s, 10 * s);
    x.lineTo(-14 * s, 10 * s);
    x.bezierCurveTo(-14 * s, -10 * s, -12 * s, -28 * s, 0, -40 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(-14 * s, 4 * s);
    x.lineTo(-24 * s, 18 * s);
    x.lineTo(-14 * s, 14 * s);
    x.stroke();
    x.beginPath();
    x.moveTo(14 * s, 4 * s);
    x.lineTo(24 * s, 18 * s);
    x.lineTo(14 * s, 14 * s);
    x.stroke();
    x.beginPath();
    x.arc(0, -8 * s, 6 * s, 0, Math.PI * 2);
    x.stroke();
    x.beginPath();
    x.moveTo(-6 * s, 10 * s);
    x.bezierCurveTo(-8 * s, 18 * s, 8 * s, 18 * s, 6 * s, 10 * s);
    x.stroke();
  }

  const SKETCHES = [
    { fn: drawCar, hw: 62, hh: 22, scale: 0.52 },
    { fn: drawSUV, hw: 58, hh: 22, scale: 0.52 },
    { fn: drawBus, hw: 80, hh: 30, scale: 0.5 },
    { fn: drawBike, hw: 46, hh: 28, scale: 0.62 },
    { fn: drawMotorbike, hw: 35, hh: 20, scale: 0.65 },
    { fn: drawScooter, hw: 28, hh: 22, scale: 0.7 },
    { fn: drawTram, hw: 60, hh: 65, scale: 0.46 },
    { fn: drawTrain, hw: 62, hh: 22, scale: 0.5 },
    { fn: drawPlane, hw: 75, hh: 46, scale: 0.5 },
    { fn: drawHelicopter, hw: 62, hh: 30, scale: 0.54 },
    { fn: drawShip, hw: 72, hh: 32, scale: 0.48 },
    { fn: drawSailboat, hw: 44, hh: 48, scale: 0.54 },
    { fn: drawHotAirBalloon, hw: 24, hh: 58, scale: 0.52 },
    { fn: drawTrafficLight, hw: 10, hh: 38, scale: 0.62 },
    { fn: drawCone, hw: 22, hh: 36, scale: 0.62 },
    { fn: drawGasPump, hw: 22, hh: 42, scale: 0.56 },
    { fn: drawBusStop, hw: 42, hh: 50, scale: 0.52 },
    { fn: drawRocketship, hw: 26, hh: 48, scale: 0.56 },
  ];

  let vehicles = [];
  function spawnVehicles() {
    vehicles = [];
    const w = W(),
      h = H();
    const PAD = 60;
    const ROWS = 7;
    const rowH = h / ROWS;
    const CENTER_X = w / 2,
      CENTER_Y = h / 2,
      DEAD_R = 200;

    for (let row = 0; row < ROWS; row++) {
      const yBase = (row + 0.5) * rowH;
      const dir = row % 2 === 0 ? 1 : -1;
      const baseSpeed = (0.2 + Math.random() * 0.18) * dir;
      const itemCount = 5 + Math.floor(Math.random() * 3);
      const placed = [];

      for (let i = 0; i < itemCount; i++) {
        const sk = SKETCHES[Math.floor(Math.random() * SKETCHES.length)];
        const col = PAL[Math.floor(Math.random() * PAL.length)];
        const sc = sk.scale * (0.82 + Math.random() * 0.28);
        const hw = sk.hw * sc,
          hh = sk.hh * sc;
        const yOff = (Math.random() - 0.5) * rowH * 0.3;
        const cy = yBase + yOff;
        const xPos = i / itemCount + Math.random() * 0.05;

        // check overlap with placed in same row
        let ok = true;
        const cx = xPos * w;
        for (const p of placed) {
          if (Math.abs(cx - p.cx) < hw + p.hw + 24) ok = false;
        }
        // skip if too close to center dead zone
        const dx = cx - CENTER_X,
          dy = cy - CENTER_Y;
        if (Math.sqrt(dx * dx + dy * dy) < DEAD_R) ok = false;

        if (ok) {
          placed.push({ cx, hw });
          vehicles.push({
            fn: sk.fn,
            hw,
            hh,
            sc,
            x: xPos,
            y: cy / h,
            speed: baseSpeed * (0.85 + Math.random() * 0.3),
            color: col,
            flip: dir < 0,
            alpha: 0.16 + Math.random() * 0.13,
            wobble: Math.random() * Math.PI * 2,
            wobbleSpeed: 0.004 + Math.random() * 0.006,
            wobbleAmt: (Math.random() - 0.5) * 0.008,
          });
        }
      }
    }
  }
  spawnVehicles();

  const orbs = Array.from({ length: 5 }, (_, i) => ({
    x: Math.random(),
    y: Math.random(),
    r: 0.18 + Math.random() * 0.15,
    color: PAL[i % 4],
    vx: (Math.random() - 0.5) * 0.00007,
    vy: (Math.random() - 0.5) * 0.00007,
    phase: Math.random() * Math.PI * 2,
    speed: 0.0002 + Math.random() * 0.0003,
  }));
  const particles = Array.from({ length: 38 }, () => ({
    x: Math.random(),
    y: Math.random(),
    size: 0.3 + Math.random() * 0.9,
    alpha: 0.04 + Math.random() * 0.1,
    vy: -(0.00005 + Math.random() * 0.00008),
    vx: (Math.random() - 0.5) * 0.00002,
    tw: Math.random() * Math.PI * 2,
    ts: 0.01 + Math.random() * 0.014,
  }));

  let t = 0;
  function draw() {
    const w = W(),
      h = H();
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#0f0d0b";
    ctx.fillRect(0, 0, w, h);

    orbs.forEach((o) => {
      o.phase += o.speed;
      o.x += o.vx + Math.sin(o.phase) * 0.00005;
      o.y += o.vy + Math.cos(o.phase * 0.7) * 0.00004;
      if (o.x < -0.3) o.x = 1.3;
      if (o.x > 1.3) o.x = -0.3;
      if (o.y < -0.3) o.y = 1.3;
      if (o.y > 1.3) o.y = -0.3;
      const px = o.x * w,
        py = o.y * h,
        pr = o.r * Math.min(w, h);
      const g = ctx.createRadialGradient(px, py, 0, px, py, pr);
      g.addColorStop(0, o.color + "0e");
      g.addColorStop(0.5, o.color + "06");
      g.addColorStop(1, "transparent");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fill();
    });

    vehicles.forEach((v) => {
      v.wobble += v.wobbleSpeed;
      v.x += (v.speed / w) * 0.85;
      if (v.speed > 0 && v.x > 1.35) v.x = -0.35;
      if (v.speed < 0 && v.x < -0.35) v.x = 1.35;
      const cx = v.x * w,
        cy = (v.y + Math.sin(v.wobble) * v.wobbleAmt) * h;
      const ex = Math.min(1, Math.min((v.x + 0.2) * 4, (1.2 - v.x) * 4));
      const alpha = v.alpha * Math.max(0, ex);
      if (alpha < 0.004) return;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = v.color;
      ctx.lineWidth = 1.05;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.translate(cx, cy);
      if (v.flip) ctx.scale(-1, 1);
      v.fn(ctx, v.sc);
      ctx.restore();
    });

    particles.forEach((p) => {
      p.x += p.vx;
      p.y += p.vy;
      p.tw += p.ts;
      if (p.y < -0.01) {
        p.y = 1.01;
        p.x = Math.random();
      }
      if (p.x < 0) p.x = 1;
      if (p.x > 1) p.x = 0;
      ctx.globalAlpha = p.alpha * (0.5 + 0.5 * Math.sin(p.tw));
      ctx.fillStyle = "#ede8e2";
      ctx.beginPath();
      ctx.arc(p.x * w, p.y * h, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // strong center vignette protects hero text
    const vg = ctx.createRadialGradient(w * 0.5, h * 0.5, h * 0.05, w * 0.5, h * 0.5, w * 0.62);
    vg.addColorStop(0, "rgba(15,13,11,0.82)");
    vg.addColorStop(0.38, "rgba(15,13,11,0.55)");
    vg.addColorStop(0.65, "rgba(15,13,11,0.22)");
    vg.addColorStop(1, "rgba(15,13,11,0.0)");
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, w, h);

    t++;
    requestAnimationFrame(draw);
  }
  draw();
</script>
